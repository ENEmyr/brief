name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: bun audit (all advisories, informational)
        run: bun audit --audit-level high
        continue-on-error: true
      - name: bun audit (critical advisories, enforced)
        run: bun audit --audit-level critical
      - name: semgrep
        run: |
          pipx install semgrep
          semgrep scan --config p/typescript --config p/security-audit --error

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Resolve installed Playwright version
        id: playwright-version
        run: echo "version=$(jq -r .version e2e/node_modules/@playwright/test/package.json)" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium (with OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright OS deps only (browsers cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: bunx playwright install-deps chromium
      - name: Run e2e suite
        run: bun run e2e
        env:
          CI: true
