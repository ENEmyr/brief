name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: bun audit (all advisories, informational)
        run: bun audit --audit-level high
        continue-on-error: true
      - name: bun audit (critical advisories, enforced)
        run: bun audit --audit-level critical
      - name: semgrep
        run: |
          pipx install semgrep
          semgrep scan --config p/typescript --config p/security-audit --error
